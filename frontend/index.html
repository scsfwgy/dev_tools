<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools</title>
    <link rel="stylesheet" href="/css/app.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GGHE7F51W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GGHE7F51W');
    </script>
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xhmbupqg3l");
    </script>
</head>
<body>
    <!-- 左侧菜单 -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-top">
            <button id="menu-toggle" class="menu-toggle" title="切换菜单" aria-label="切换菜单">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="sidebar-brand" data-i18n="app.name">DevTools</div>
        </div>
        <div class="sidebar-search">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="menu-search" class="search-input" type="text" data-i18n-placeholder="menu.searchPlaceholder" placeholder="搜索工具...">
        </div>
        <nav id="menu-list" class="menu-list">
            <!-- JS 动态渲染 -->
        </nav>
        <div class="sidebar-bottom">
            <button id="settings-toggle" class="sidebar-action" title="设置" aria-label="设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1a2 2 0 0 1 2 2v1.2c.5.2 1 .4 1.4.7l.9-.9a2 2 0 0 1 2.8 2.8l-.9.9c.3.5.5 1 .7 1.4H21a2 2 0 0 1 0 4h-1.2c-.2.5-.4 1-.7 1.4l.9.9a2 2 0 0 1-2.8 2.8l-.9-.9c-.5.3-1 .5-1.4.7V21a2 2 0 0 1-4 0v-1.2c-.5-.2-1-.4-1.4-.7l-.9.9a2 2 0 0 1-2.8-2.8l.9-.9c-.3-.5-.5-1-.7-1.4H3a2 2 0 0 1 0-4h1.2c.2-.5.4-1 .7-1.4l-.9-.9a2 2 0 0 1 2.8-2.8l.9.9c.5-.3 1-.5 1.4-.7V3a2 2 0 0 1 2-2z"/>
                </svg>
                <span class="sidebar-action-label" data-i18n="settings.title">设置</span>
            </button>
        </div>
    </aside>

    <!-- 设置面板 -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-section">
            <label class="settings-label" data-i18n="settings.language">语言 / Language</label>
            <select id="lang-select" class="settings-select">
                <option value="zh-CN">中文</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="settings-section">
            <label class="settings-label" data-i18n="settings.theme">主题 / Theme</label>
            <select id="theme-select" class="settings-select">
                <option value="dark" data-i18n="settings.themeDark">深色</option>
                <option value="light" data-i18n="settings.themeLight">浅色</option>
            </select>
        </div>
    </div>

    <!-- 右侧内容 -->
    <main id="content" class="content">
        <!-- JS 动态渲染 -->
    </main>

    <script src="/js/json-tool.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
