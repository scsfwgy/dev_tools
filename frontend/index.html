<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- 设置按钮 -->
    <button id="settings-toggle" class="settings-btn" title="设置" aria-label="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1a2 2 0 0 1 2 2v1.2c.5.2 1 .4 1.4.7l.9-.9a2 2 0 0 1 2.8 2.8l-.9.9c.3.5.5 1 .7 1.4H21a2 2 0 0 1 0 4h-1.2c-.2.5-.4 1-.7 1.4l.9.9a2 2 0 0 1-2.8 2.8l-.9-.9c-.5.3-1 .5-1.4.7V21a2 2 0 0 1-4 0v-1.2c-.5-.2-1-.4-1.4-.7l-.9.9a2 2 0 0 1-2.8-2.8l.9-.9c-.3-.5-.5-1-.7-1.4H3a2 2 0 0 1 0-4h1.2c.2-.5.4-1 .7-1.4l-.9-.9a2 2 0 0 1 2.8-2.8l.9.9c.5-.3 1-.5 1.4-.7V3a2 2 0 0 1 2-2z"/>
        </svg>
    </button>

    <!-- 设置面板 -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-section">
            <label class="settings-label" data-i18n="settings.language">语言 / Language</label>
            <select id="lang-select" class="settings-select">
                <option value="zh-CN">中文</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="settings-section">
            <label class="settings-label" data-i18n="settings.theme">主题 / Theme</label>
            <select id="theme-select" class="settings-select">
                <option value="dark" data-i18n="settings.themeDark">深色</option>
                <option value="light" data-i18n="settings.themeLight">浅色</option>
            </select>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🛠️ DevTools</h1>
            <p class="subtitle" data-i18n="subtitle">开发工具集</p>
        </header>
        <main>
            <div class="status-card">
                <span class="dot"></span>
                <span data-i18n="status.running">服务运行中</span>
            </div>
        </main>
        <footer>
            <p>DevTools &copy; 2026</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
